<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUZO GO Admin Dashboard</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f3f6fb;
padding:20px;
}

.header{
background:linear-gradient(135deg,#16a34a,#15803d);
color:white;
padding:25px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.header h1{
font-size:32px;
}

.header p{
margin-top:5px;
opacity:.9;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
text-align:center;
}

.card h2{
font-size:30px;
color:#16a34a;
margin-bottom:5px;
}

.search-box{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

.table-box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
overflow:auto;
}

.refreshBtn{
background:#2563eb;
color:white;
border:none;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#16a34a;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #eee;
text-align:center;
}

.status{
padding:6px 12px;
border-radius:20px;
color:white;
font-weight:bold;
}

.approved{
background:#16a34a;
}

.pending{
background:#f59e0b;
}

.rejected{
background:#dc2626;
}

.actionBtn{
border:none;
padding:8px 10px;
margin:2px;
border-radius:8px;
cursor:pointer;
color:white;
}

.viewBtn{
background:#2563eb;
}

.editBtn{
background:#f59e0b;
}

.approveBtn{
background:#16a34a;
}

.rejectBtn{
background:#dc2626;
}

.deleteBtn{
background:#111827;
}

.profile{
width:50px;
height:50px;
border-radius:50%;
object-fit:cover;
}

@media(max-width:768px){

.header h1{
font-size:24px;
}

table{
font-size:13px;
}

}

</style></head>
<body><div class="header">
<h1>🌍 GUZO GO Dashboard</h1>
<p>Visa Application Management System</p>
</div><div class="stats"><div class="card">
<h2 id="total">0</h2>
<p>Total Applicants</p>
</div><div class="card">
<h2 id="approvedCount">0</h2>
<p>Approved</p>
</div><div class="card">
<h2 id="pendingCount">0</h2>
<p>Pending</p>
</div><div class="card">
<h2 id="rejectedCount">0</h2>
<p>Rejected</p>
</div></div><div class="search-box"><input
type="text"
id="searchInput"
placeholder="Search Passport Number..."
onkeyup="loadApplicants()">

</div><div class="table-box"><button
class="refreshBtn"
onclick="loadApplicants()">
Refresh List
</button>

<table><thead><tr>
<th>Photo</th>
<th>Name</th>
<th>Passport</th>
<th>Country</th>
<th>Visa Type</th>
<th>Status</th>
<th>Actions</th>
</tr></thead><tbody id="tableBody"></tbody></table></div><script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBTAsl13IVaetUhf-2TiYDxl-qWXeBl4w0",
authDomain: "guzo-go-fc6ad.firebaseapp.com",
projectId: "guzo-go-fc6ad",
storageBucket: "guzo-go-fc6ad.firebasestorage.app",
messagingSenderId: "403496798385",
appId: "1:403496798385:web:2700fcd232230741113a90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.loadApplicants = async function(){

const table = document.getElementById("tableBody");
const search = document.getElementById("searchInput").value.toLowerCase();

table.innerHTML = "";

let total = 0;
let approved = 0;
let pending = 0;
let rejected = 0;

const snapshot = await getDocs(collection(db,"applicants"));

snapshot.forEach((item)=>{

const data = item.data();

if(
search &&
!(data.passportNumber || "")
.toLowerCase()
.includes(search)
){
return;
}

total++;

if(data.status === "Approved") approved++;
else if(data.status === "Rejected") rejected++;
else pending++;

let statusClass = "pending";

if(data.status === "Approved"){
statusClass = "approved";
}

if(data.status === "Rejected"){
statusClass = "rejected";
}

table.innerHTML += `

<tr><td>
<img
class="profile"
src="${data.photoUrl || 'https://via.placeholder.com/50'}">
</td><td>${data.fullName || ""}</td><td>${data.passportNumber || ""}</td><td>${data.country || ""}</td><td>${data.visaType || ""}</td><td>
<span class="status ${statusClass}">
${data.status || "Pending"}
</span>
</td><td><button
class="actionBtn viewBtn"
onclick="viewApplicant('${item.id}')">
👁
</button>

<button
class="actionBtn editBtn"
onclick="editApplicant('${item.id}')">
✏️
</button>

<button
class="actionBtn approveBtn"
onclick="approveApplicant('${item.id}')">
✅
</button>

<button
class="actionBtn rejectBtn"
onclick="rejectApplicant('${item.id}')">
❌
</button>

<button
class="actionBtn deleteBtn"
onclick="deleteApplicant('${item.id}')">
🗑
</button>

</td></tr>
`;});

document.getElementById("total").innerText = total;
document.getElementById("approvedCount").innerText = approved;
document.getElementById("pendingCount").innerText = pending;
document.getElementById("rejectedCount").innerText = rejected;

}

window.approveApplicant = async function(id){

await updateDoc(
doc(db,"applicants",id),
{
status:"Approved"
}
);

loadApplicants();

}

window.rejectApplicant = async function(id){

await updateDoc(
doc(db,"applicants",id),
{
status:"Rejected"
}
);

loadApplicants();

}

window.deleteApplicant = async function(id){

if(confirm("Delete Applicant?")){

await deleteDoc(
doc(db,"applicants",id)
);

loadApplicants();

}

}

window.viewApplicant = async function(id){

const snapshot = await getDocs(collection(db,"applicants"));

snapshot.forEach((item)=>{

if(item.id === id){

const d = item.data();

alert(
"Full Name: " + (d.fullName || "") + "\n\n" +
"Passport: " + (d.passportNumber || "") + "\n\n" +
"Nationality: " + (d.nationality || "") + "\n\n" +
"Date Of Birth: " + (d.dob || "") + "\n\n" +
"Gender: " + (d.gender || "") + "\n\n" +
"Country: " + (d.country || "") + "\n\n" +
"Visa Type: " + (d.visaType || "") + "\n\n" +
"Status: " + (d.status || "")
);

}

});

}

window.editApplicant = async function(id){

const snapshot = await getDocs(collection(db,"applicants"));

snapshot.forEach((item)=>{

if(item.id === id){

const d = item.data();

const fullName =
prompt("Full Name", d.fullName || "");

if(fullName === null) return;

const country =
prompt("Country", d.country || "");

if(country === null) return;

const visaType =
prompt("Visa Type", d.visaType || "");

if(visaType === null) return;

updateDoc(
doc(db,"applicants",id),
{
fullName,
country,
visaType
}
).then(()=>{

alert("Updated Successfully");
loadApplicants();

});

}

});

}

loadApplicants();
window.approveApplicant = async function(id){

await updateDoc(
doc(db,"applicants",id),
{
status:"Approved"
}
);

loadApplicants();

}

window.rejectApplicant = async function(id){

await updateDoc(
doc(db,"applicants",id),
{
status:"Rejected"
}
);

loadApplicants();

}

window.deleteApplicant = async function(id){

const ok = confirm(
"Are you sure you want to delete this applicant?"
);

if(!ok) return;

await deleteDoc(
doc(db,"applicants",id)
);

loadApplicants();

}

window.viewApplicant = async function(id){

const snapshot =
await getDocs(collection(db,"applicants"));

snapshot.forEach((item)=>{

if(item.id===id){

const d = item.data();

alert(
"Full Name: " + (d.fullName || "") + "\n\n" +
"Passport: " + (d.passportNumber || "") + "\n\n" +
"Application ID: " + (d.applicationId || "") + "\n\n" +
"Nationality: " + (d.nationality || "") + "\n\n" +
"DOB: " + (d.dob || "") + "\n\n" +
"Gender: " + (d.gender || "") + "\n\n" +
"Country: " + (d.country || "") + "\n\n" +
"Visa Type: " + (d.visaType || "") + "\n\n" +
"Status: " + (d.status || "Pending")
);

}

});

}

loadApplicants();
</script>
</body>
</html>
