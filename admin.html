<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUZO GO ADMIN</title><style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#16a34a;
}

input,select{
width:100%;
padding:12px;
margin-top:12px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.logout{
background:#dc2626;
}

.logout:hover{
background:#b91c1c;
}
</style></head>
<body><div class="container"><h1>GUZO GO ADMIN</h1><button class="logout" onclick="logout()">Logout</button>

<input type="text" id="fullName" placeholder="Full Name">
<input type="text" id="passportNumber" placeholder="Passport Number">
<input type="text" id="applicationId" placeholder="Application ID">
<input type="text" id="nationality" placeholder="Nationality">
<input type="text" id="photoUrl" placeholder="Photo URL"><input type="date" id="dob"><select id="gender">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select><input type="text" id="country" placeholder="Destination Country">
<input type="text" id="visaType" placeholder="Visa Type"><input type="date" id="issueDate">
<input type="date" id="expiryDate"><select id="status">
<option>Approved</option>
<option>Pending</option>
<option>Rejected</option>
</select><button onclick="saveApplicant()">Save Applicant</button>

</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_STORAGE_BUCKET",
messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="login.html";
}
});

window.logout = async function(){
await signOut(auth);
window.location.href="login.html";
}

window.saveApplicant = async function(){

try{

await addDoc(collection(db,"applicants"),{

fullName: document.getElementById("fullName").value,
passportNumber: document.getElementById("passportNumber").value,
applicationId: document.getElementById("applicationId").value,
nationality: document.getElementById("nationality").value,
photoUrl: document.getElementById("photoUrl").value,

dob: document.getElementById("dob").value,
gender: document.getElementById("gender").value,
country: document.getElementById("country").value,
visaType: document.getElementById("visaType").value,
issueDate: document.getElementById("issueDate").value,
expiryDate: document.getElementById("expiryDate").value,

status: document.getElementById("status").value

});

alert("Applicant Saved Successfully!");

document.querySelectorAll("input").forEach(input => input.value="");

}catch(error){

alert(error.message);

}

}

</script></body>
</html>
