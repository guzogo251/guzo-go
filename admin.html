<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUZO GO ADMIN</title><style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#16a34a;
margin-bottom:20px;
}

label{
display:block;
margin-top:12px;
font-weight:bold;
color:#16a34a;
}

input,select{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.logout{
background:#dc2626;
}

.logout:hover{
background:#b91c1c;
}
</style></head>
<body><div class="container"><h1>GUZO GO ADMIN</h1><button class="logout" onclick="logout()">Logout</button>

<label>Full Name</label>
<input type="text" id="fullName">

<label>Passport Number</label>
<input type="text" id="passportNumber">

<label>Application ID</label>
<input type="text" id="applicationId">

<label>Nationality</label>
<input type="text" id="nationality">

<label>Photo URL</label>
<input type="text" id="photoUrl">

<label>Date of Birth</label>
<input type="date" id="dob">

<label>Gender</label>
<select id="gender">

<option value="">Select Gender</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
</select><label>Destination Country</label>
<input type="text" id="country">

<label>Visa Type</label>
<input type="text" id="visaType">

<label>Issue Date</label>
<input type="date" id="issueDate">

<label>Expiry Date</label>
<input type="date" id="expiryDate">

<label>Status</label>
<select id="status">

<option>Approved</option>
<option>Pending</option>
<option>Rejected</option>
</select><button onclick="saveApplicant()">Save Applicant</button>

</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBTAsl13IVaetUhf-2TiYDxl-qWXeBl4w0",
authDomain: "guzo-go-fc6ad.firebaseapp.com",
projectId: "guzo-go-fc6ad",
storageBucket: "guzo-go-fc6ad.firebasestorage.app",
messagingSenderId: "403496798385",
appId: "1:403496798385:web:2700fcd232230741113a90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{
if(!user){
window.location.href="login.html";
}
});

window.logout = async function(){
await signOut(auth);
window.location.href="login.html";
}

window.saveApplicant = async function(){

try{

await addDoc(collection(db,"applicants"),{

fullName: document.getElementById("fullName").value,
passportNumber: document.getElementById("passportNumber").value,
applicationId: document.getElementById("applicationId").value,
nationality: document.getElementById("nationality").value,
photoUrl: document.getElementById("photoUrl").value,

dob: document.getElementById("dob").value,
gender: document.getElementById("gender").value,
country: document.getElementById("country").value,
visaType: document.getElementById("visaType").value,
issueDate: document.getElementById("issueDate").value,
expiryDate: document.getElementById("expiryDate").value,

status: document.getElementById("status").value

});

alert("Applicant Saved Successfully!");

document.querySelectorAll("input").forEach(input => input.value="");

}catch(error){

alert(error.message);

}

}

</script></body>
  </html>
