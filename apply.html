<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUZO GO Visa Application</title><style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#16a34a;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

label{
font-weight:bold;
color:#16a34a;
}
</style></head>
<body><div class="container"><h1>🌍 GUZO GO Visa Application</h1><label>Full Name</label>
<input type="text" id="fullName">

<label>Passport Number</label>
<input type="text" id="passportNumber">

<label>Application ID</label>
<input type="text" id="applicationId">

<label>Nationality</label>
<input type="text" id="nationality">

<label>Photo URL</label>
<input type="text" id="photoUrl">

<label>Date of Birth</label>
<input type="date" id="dob">

<label>Gender</label>
<select id="gender">

<option value="Male">Male</option>
<option value="Female">Female</option>
</select><label>Destination Country</label>
<input type="text" id="country">

<label>Visa Type</label>
<input type="text" id="visaType">

<button onclick="submitApplication()">
Submit Application
</button></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBTAsl13IVaetUhf-2TiYDxl-qWXeBl4w0",
authDomain: "guzo-go-fc6ad.firebaseapp.com",
projectId: "guzo-go-fc6ad",
storageBucket: "guzo-go-fc6ad.firebasestorage.app",
messagingSenderId: "403496798385",
appId: "1:403496798385:web:2700fcd232230741113a90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.submitApplication = async function(){

try{

await addDoc(collection(db,"applicants"),{

fullName: document.getElementById("fullName").value,
passportNumber: document.getElementById("passportNumber").value,
applicationId: document.getElementById("applicationId").value,
nationality: document.getElementById("nationality").value,
photoUrl: document.getElementById("photoUrl").value,
dob: document.getElementById("dob").value,
gender: document.getElementById("gender").value,
country: document.getElementById("country").value,
visaType: document.getElementById("visaType").value,

status: "Pending"

});

alert("Application Submitted Successfully!");

}catch(error){

alert(error.message);

}

}

</script></body>
          </html>
