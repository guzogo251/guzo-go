<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUZO GO Visa Verification</title>
<style>

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
font-family:Arial,sans-serif;
margin:0;
padding:0;
min-height:100vh;
}

header{
background:linear-gradient(135deg,#16a34a,#15803d);
color:white;
text-align:center;
padding:30px;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.search-box{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.15);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

button{
background:#16a34a;
color:white;
}

.admin-btn{
background:#2563eb;
color:white;
}

.card{
background:white;
padding:25px;
margin-top:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.15);
text-align:center;
}

.photo{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
border:4px solid #16a34a;
margin-bottom:15px;
}

.status{
padding:8px 15px;
border-radius:20px;
color:white;
font-weight:bold;
display:inline-block;
}

.approved{
background:#16a34a;
}

.pending{
background:#f59e0b;
}

.rejected{
background:#dc2626;
}

.footer{
margin-top:15px;
font-size:13px;
color:#666;
}

</style>

</head>
<body>

<header>
<h1>🌍 GUZO GO</h1>
<p>Your Trusted Travel Partner</p>
</header>

<div class="container">

<div class="search-box">

<h2>Visa Verification</h2>

<input
type="text"
id="passportNumber"
placeholder="Enter Passport Number">

<button onclick="searchApplicant()">
Check Status
</button>

<button
class="admin-btn"
onclick="window.location.href='login.html'">
Admin Login
</button>

<div id="result"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBTAsl13IVaetUhf-2TiYDxl-qWXeBl4w0",
authDomain: "guzo-go-fc6ad.firebaseapp.com",
projectId: "guzo-go-fc6ad",
storageBucket: "guzo-go-fc6ad.firebasestorage.app",
messagingSenderId: "403496798385",
appId: "1:403496798385:web:2700fcd232230741113a90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.searchApplicant = async function(){

const passport =
document.getElementById("passportNumber").value.trim();

const result =
document.getElementById("result");

result.innerHTML = "Searching...";

try{

const querySnapshot =
await getDocs(collection(db,"applicants"));

let found = false;

querySnapshot.forEach((doc)=>{

const data = doc.data();

if(data.passportNumber === passport){

found = true;

let statusClass = "pending";

if(data.status === "Approved"){
statusClass = "approved";
}

if(data.status === "Rejected"){
statusClass = "rejected";
}

result.innerHTML = `
<div class="card">

${data.photoUrl ? `
<img src="${data.photoUrl}" class="photo">
` : ""}

<h3>${data.fullName}</h3>

<p><b>Passport Number:</b> ${data.passportNumber}</p>

<p><b>Application ID:</b> ${data.applicationId}</p>

<p><b>Nationality:</b> ${data.nationality}</p><p><b>Date of Birth:</b> ${data.dob || "-"}</p><p><b>Gender:</b> ${data.gender || "-"}</p><p><b>Destination Country:</b> ${data.country || "-"}</p><p><b>Visa Type:</b> ${data.visaType || "-"}</p><p><b>Issue Date:</b> ${data.issueDate || "-"}</p><p><b>Expiry Date:</b> ${data.expiryDate || "-"}</p><p>
<span class="status ${statusClass}">
${data.status}
</span>
</p>

<div class="footer">
✅ Officially Verified by GUZO GO System
</div>

</div>
`;

}

});

if(!found){
result.innerHTML =
"<div class='card'>❌ No Record Found</div>";
}

}catch(error){

result.innerHTML =
"<div class='card'>"+error.message+"</div>";

}

}

</script>

</body>
</html>
